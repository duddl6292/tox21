{% extends "base.html" %} {% block content %}
<div class="card small-card" style="text-align: center">
  <h2>회원 탈퇴</h2>
  <p>
    안전한 탈퇴 처리를 위해 <strong>비밀번호</strong>를 다시 한번 입력해 주세요.
  </p>


  {% if messages %}
  <div style="color: #dc3545; margin-bottom: 15px; font-weight: bold">
    {% for message in messages %} {{ message }} {% endfor %}
  </div>
  {% endif %}


  <form method="post">
    {% csrf_token %}


    <div style="margin-bottom: 20px">
      <input
        type="password"
        name="password"
        placeholder="비밀번호 입력"
        required
        style="
          padding: 10px;
          width: 80%;
          max-width: 300px;
          border: 1px solid #ced4da;
          border-radius: 5px;
          outline: none;
        "
      />
    </div>


    <button type="submit" class="btn btn-danger">탈퇴</button>
    <a href="{% url 'accounts:mypage' %}" class="btn btn-gray">취소</a>
  </form>
</div>
{% endblock %}
