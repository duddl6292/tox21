{% extends "base.html" %}

{% block content %}
<div class="card small-card">
  <h2>비밀번호 초기화</h2>

  <p>
    <b>{{ user_obj.username }}</b> 회원의 비밀번호를
    <b>1234</b>로 초기화하시겠습니까?
  </p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">초기화</button>
    <a href="{% url 'accounts:admin_user_detail' user_obj.pk %}" class="btn btn-gray">취소</a>
  </form>
</div>
{% endblock %}
